# Development Docker Compose - includes local PostgreSQL
# Usage: docker compose --env-file .env.dev -f docker-compose.dev.yml up --build

services:
  postgres:
    image: postgres:16-alpine
    env_file: .env.dev
    environment:
      POSTGRES_DB: ${DB_NAME:-inventory}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - postgres

  backend:
    build: ./src/backend
    env_file: .env.dev
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-inventory}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      # JWT Authentication
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production-min-256-bits}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      # Cookie Configuration
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      # Google OAuth2 (optional)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      # Image Storage (noop in dev by default)
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-noop}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      # Stripe (optional in dev)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # AI Image Analysis (noop = disabled, ollama = local LLM, gemini = Google Gemini API)
      # Ollama setup: brew install ollama && ollama pull gemma3:4b && ollama serve
      AI_PROVIDER: ${AI_PROVIDER:-ollama}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:4b}
      OLLAMA_ALLOWED_HOSTS: ${OLLAMA_ALLOWED_HOSTS:-}
      # Gemini (required only when AI_PROVIDER=gemini)
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_TIMEOUT: ${GEMINI_TIMEOUT:-30}
      GEMINI_THREAD_POOL: ${GEMINI_THREAD_POOL:-2}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./src/frontend
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "3000:80"
    environment:
      BACKEND_URL: http://backend:8080
      PORT: 80
    depends_on:
      - backend

volumes:
  postgres_data:
