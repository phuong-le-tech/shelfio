# Production Docker Compose - connects to external database
# Usage: docker compose --env-file .env.prod up --build

services:
  backend:
    build: ./src/backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      # JWT Authentication
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      # Cookie Configuration
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      # Google OAuth2 (optional)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      # Email
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-noop}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@example.com}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      # Image Storage (R2)
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-noop}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      # Stripe (optional)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # AI Image Analysis (noop = disabled, ollama = local/remote LLM, gemini = Google Gemini API)
      AI_PROVIDER: ${AI_PROVIDER:-noop}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3:4b}
      OLLAMA_ALLOWED_HOSTS: ${OLLAMA_ALLOWED_HOSTS:-}
      # Gemini (required only when AI_PROVIDER=gemini)
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      GEMINI_TIMEOUT: ${GEMINI_TIMEOUT:-30}
      GEMINI_THREAD_POOL: ${GEMINI_THREAD_POOL:-2}
      # Monitoring
      SENTRY_DSN: ${SENTRY_DSN:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./src/frontend
      args:
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    ports:
      - "3000:80"
    environment:
      BACKEND_URL: http://backend:8080
      PORT: 80
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
