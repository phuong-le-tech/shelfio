# Production profile overrides

# Trusted proxies for X-Forwarded-For header processing (Tomcat RemoteIpValve)
# Set TRUSTED_PROXIES to your reverse proxy / load balancer IP pattern (regex).
# Default: private IP ranges (10.x, 192.168.x, 172.16-31.x, 127.x, IPv6 loopback)
server.tomcat.remoteip.internal-proxies=${TRUSTED_PROXIES:10\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|192\\.168\\.\\d{1,3}\\.\\d{1,3}|172\\.(?:1[6-9]|2\\d|3[01])\\.\\d{1,3}\\.\\d{1,3}|127\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|::1|0:0:0:0:0:0:0:1}

# Database — Railway PostgreSQL requires SSL
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=require

# HikariCP connection pool (Railway shared PostgreSQL allows ~20 connections)
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# Validate schema - never auto-update in production
spring.jpa.hibernate.ddl-auto=validate

# Flyway manages schema migrations in production
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Disable SQL logging for performance
spring.jpa.show-sql=false

# Enforce secure cookies in production
app.cookie.secure=true

# Actuator - expose only health endpoint on a separate management port
# This ensures actuator endpoints are not accessible via the public application port
management.server.port=${MANAGEMENT_PORT:8081}
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
