# Production profile overrides

# Trusted proxies for X-Forwarded-For header processing (Tomcat RemoteIpValve)
# Set TRUSTED_PROXIES to your reverse proxy / load balancer IP pattern (regex).
# Default: private IP ranges (10.x, 192.168.x, 172.16-31.x, 127.x, IPv6 loopback)
server.tomcat.remoteip.internal-proxies=${TRUSTED_PROXIES:10\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|192\\.168\\.\\d{1,3}\\.\\d{1,3}|172\\.(?:1[6-9]|2\\d|3[01])\\.\\d{1,3}\\.\\d{1,3}|127\\.\\d{1,3}\\.\\d{1,3}\\.\\d{1,3}|::1|0:0:0:0:0:0:0:1}

# Validate schema - never auto-update in production
spring.jpa.hibernate.ddl-auto=validate

# Flyway manages schema migrations in production
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Disable SQL logging for performance
spring.jpa.show-sql=false

# Enforce secure cookies in production
app.cookie.secure=true

# Actuator - expose only health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
