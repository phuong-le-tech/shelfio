spring.application.name=inventory-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

server.port=${PORT:8080}
server.forward-headers-strategy=NATIVE

# Database (common config - values from env vars)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:inventory}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# JWT Configuration
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:14400000}

# File Upload Limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Cookie Configuration
app.cookie.secure=${COOKIE_SECURE:false}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# Email Configuration
app.email.provider=${EMAIL_PROVIDER:noop}
app.email.from=${EMAIL_FROM:noreply@example.com}
app.email.resend-api-key=${RESEND_API_KEY:}

# Image Storage (noop = local no-op, r2 = Cloudflare R2)
app.storage.provider=${STORAGE_PROVIDER:noop}
app.storage.r2.endpoint=${R2_ENDPOINT:}
app.storage.r2.access-key=${R2_ACCESS_KEY:}
app.storage.r2.secret-key=${R2_SECRET_KEY:}
app.storage.r2.bucket=${R2_BUCKET:}
app.storage.r2.region=${R2_REGION:auto}
app.storage.r2.presigned-url-expiry-minutes=${R2_PRESIGNED_URL_EXPIRY_MINUTES:15}

# AI Image Analysis (noop = disabled, ollama = local LLM)
app.ai.provider=${AI_PROVIDER:noop}
app.ai.ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
app.ai.ollama.model=${OLLAMA_MODEL:gemma3:4b}
app.ai.ollama.timeout-seconds=${OLLAMA_TIMEOUT:120}
app.ai.ollama.thread-pool-size=${OLLAMA_THREAD_POOL:2}
app.ai.ollama.allowed-hosts=${OLLAMA_ALLOWED_HOSTS:}

# Premium feature toggle (set to false to disable Stripe checkout & list limits)
app.premium.enabled=${PREMIUM_ENABLED:true}

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.price-amount=200
stripe.price-currency=eur

# Admin seed (prod only — set once, remove after first deploy)
app.admin.email=${ADMIN_EMAIL:}
app.admin.password=${ADMIN_PASSWORD:}

# Sentry
sentry.dsn=${SENTRY_DSN:}
sentry.environment=${SPRING_PROFILES_ACTIVE:dev}
sentry.traces-sample-rate=0.1

